<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Store-Layout-Sample-1 — Walkthrough</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0e0f12;font-family:Segoe UI,Arial,sans-serif;color:#e6e6e6}
  #c{display:block;width:100%;height:100%;cursor:grab}
  #c:active{cursor:grabbing}
  #help{position:absolute;top:12px;left:12px;background:#000a;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.7;max-width:280px}
  #help b{color:#fff}
  kbd{background:#2a2d33;border:1px solid #555;border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-family:monospace;font-size:12px}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:#0e0f12;z-index:10;text-align:center;padding:20px}
  #ui{position:absolute;bottom:14px;left:12px;background:#000a;padding:8px 12px;border-radius:8px;font-size:12px;display:flex;gap:10px;align-items:center}
  #reset{position:absolute;top:12px;right:12px;background:#2a2d33;color:#eee;border:1px solid #555;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px}
  input[type=range]{vertical-align:middle}
</style>
</head>
<body>
<div id="loading">Loading 3D model…<br><small>first load may take several seconds</small></div>
<canvas id="c"></canvas>
<div id="help">
  <b>Store-Layout-Sample-1</b><br>
  <b>Click anywhere</b> to glide there (Matterport-style)<br>
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / arrows — move<br>
  <kbd>Space</kbd> up &nbsp;·&nbsp; <kbd>Q</kbd> down<br>
  Drag mouse — look around<br>
  Scroll wheel — zoom forward/back<br>
  Hold <kbd>Shift</kbd> — move faster
</div>
<button id="reset">Reset view</button>
<div id="ui">Speed <input id="speed" type="range" min="0.2" max="8" step="0.1" value="1"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const MODEL_URL = 'model.glb';

// Fixed start camera pose (p = position, y = yaw, pi = pitch)
const START = { p:[4.898, 0.93, -6.439], y:-3.86, pi:-0.0969 };

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15171c);
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.01, 100000);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.add(new THREE.HemisphereLight(0xffffff, 0x404040, 1.0));
const dir = new THREE.DirectionalLight(0xffffff, 1.4); dir.position.set(1,2,1); scene.add(dir);

const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let moveSpeedBase = 1;
let startPos = new THREE.Vector3(), startYaw = 0, startPitch = 0;
let modelRoot = null, markerSize = 1;
const raycaster = new THREE.Raycaster();

loader.load(MODEL_URL, (gltf)=>{
  modelRoot = gltf.scene;
  scene.add(modelRoot);
  const box = new THREE.Box3().setFromObject(modelRoot);
  const size = box.getSize(new THREE.Vector3());
  const diag = size.length();
  camera.far = diag*10; camera.near = Math.max(diag/100000, 0.001); camera.updateProjectionMatrix();
  moveSpeedBase = diag/8;
  markerSize = diag/40;
  makeMarker();
  // apply fixed start pose
  camera.position.set(START.p[0], START.p[1], START.p[2]);
  yaw = START.y; pitch = START.pi; applyRot();
  startPos.copy(camera.position); startYaw = yaw; startPitch = pitch;
  document.getElementById('loading').style.display='none';
}, (e)=>{
  if(e.total){ document.getElementById('loading').innerHTML = 'Loading… '+Math.round(e.loaded/e.total*100)+'%'; }
}, (err)=>{
  document.getElementById('loading').innerHTML = 'Failed to load model.<br><small>'+err+'</small>';
});

// ---------- look / orientation ----------
let yaw=0, pitch=0;
function applyRot(){ camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ')); }

// ---------- Matterport-style click-to-move ----------
let tween = null;
function cancelTween(){ tween = null; }
function flyTo(destPos, tYaw, tPitch){
  tween = {
    fromPos: camera.position.clone(),
    toPos: destPos.clone(),
    qStart: camera.quaternion.clone(),
    qEnd: new THREE.Quaternion().setFromEuler(new THREE.Euler(tPitch, tYaw, 0, 'YXZ')),
    tYaw, tPitch, t:0, dur:0.6
  };
}
function handleClick(cx, cy){
  if(!modelRoot || tween) return;
  const ndc = new THREE.Vector2((cx/innerWidth)*2-1, -(cy/innerHeight)*2+1);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(modelRoot, true);
  if(!hits.length) return;
  const p = hits[0].point.clone();
  // walk to the clicked spot keeping current eye height; stop a little short so we don't clip walls
  const dest = new THREE.Vector3(p.x, camera.position.y, p.z);
  const toCam = new THREE.Vector3().subVectors(camera.position, dest); toCam.y = 0;
  const d = toCam.length();
  if(d > 1e-3){ toCam.normalize(); dest.addScaledVector(toCam, Math.min(moveSpeedBase, d*0.35)); }
  // face the direction of travel (horizontal), keep current pitch
  const travel = new THREE.Vector3().subVectors(dest, camera.position); travel.y = 0;
  let tYaw = yaw;
  if(travel.lengthSq() > 1e-4){ travel.normalize(); tYaw = Math.atan2(-travel.x, -travel.z); }
  flyTo(dest, tYaw, pitch);
  showMarker(p);
}

// ---------- click destination marker ----------
let marker = null, markerLife = 0;
function makeMarker(){
  const g = new THREE.RingGeometry(0.6, 1.0, 48);
  marker = new THREE.Mesh(g, new THREE.MeshBasicMaterial({
    color:0x7fb3ff, transparent:true, opacity:0, depthTest:false, side:THREE.DoubleSide
  }));
  marker.rotation.x = -Math.PI/2;
  marker.renderOrder = 999;
  marker.visible = false;
  scene.add(marker);
}
function showMarker(p){
  if(!marker) return;
  marker.position.set(p.x, p.y + markerSize*0.02, p.z);
  markerLife = 1; marker.visible = true;
}

// ---------- mouse look + click detection ----------
let dragging=false, lastX=0, lastY=0, downX=0, downY=0;
canvas.addEventListener('mousedown', e=>{
  dragging=true; lastX=e.clientX; lastY=e.clientY; downX=e.clientX; downY=e.clientY;
  cancelTween();
});
addEventListener('mouseup', e=>{
  if(dragging && Math.hypot(e.clientX-downX, e.clientY-downY) < 5) handleClick(e.clientX, e.clientY);
  dragging=false;
});
addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
  if(Math.hypot(dx,dy) > 0) cancelTween();
  yaw -= dx*0.005;
  pitch = THREE.MathUtils.clamp(pitch - dy*0.005, -Math.PI/2+0.01, Math.PI/2-0.01);
  applyRot();
});

const keys={};
const MOVE_CODES = ['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyQ'];
addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(MOVE_CODES.includes(e.code)){ e.preventDefault(); cancelTween(); }
  // press P to log current pose — handy for capturing new start positions
  if(e.code==='KeyP'){
    const pose = {p:[+camera.position.x.toFixed(3),+camera.position.y.toFixed(3),+camera.position.z.toFixed(3)], y:+yaw.toFixed(4), pi:+pitch.toFixed(4)};
    console.log('camera pose:', JSON.stringify(pose));
  }
});
addEventListener('keyup', e=>{ keys[e.code]=false; });

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  cancelTween();
  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  camera.position.addScaledVector(fwd, -e.deltaY*0.012*moveSpeedBase);
},{passive:false});

const speedEl=document.getElementById('speed');
document.getElementById('reset').onclick=()=>{
  cancelTween();
  camera.position.copy(startPos); yaw=startYaw; pitch=startPitch; applyRot();
};

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);

  if(tween){
    tween.t += dt/tween.dur;
    const k = tween.t>=1 ? 1 : tween.t*tween.t*(3-2*tween.t); // smoothstep ease
    camera.position.lerpVectors(tween.fromPos, tween.toPos, k);
    camera.quaternion.slerpQuaternions(tween.qStart, tween.qEnd, k);
    if(tween.t>=1){ yaw=tween.tYaw; pitch=tween.tPitch; applyRot(); tween=null; }
  } else {
    let sp = moveSpeedBase * parseFloat(speedEl.value) * dt;
    if(keys['ShiftLeft']||keys['ShiftRight']) sp*=4;
    const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
    if(keys['KeyW']||keys['ArrowUp'])    camera.position.addScaledVector(fwd, sp);
    if(keys['KeyS']||keys['ArrowDown'])  camera.position.addScaledVector(fwd, -sp);
    if(keys['KeyD']||keys['ArrowRight']) camera.position.addScaledVector(right, sp);
    if(keys['KeyA']||keys['ArrowLeft'])  camera.position.addScaledVector(right, -sp);
    if(keys['Space']) camera.position.y += sp;
    if(keys['KeyQ'])  camera.position.y -= sp;
  }

  // fade the click marker
  if(marker && markerLife>0){
    markerLife -= dt*1.6;
    const a = Math.max(markerLife, 0);
    marker.material.opacity = a*0.9;
    const s = markerSize*(1.6 - a*0.6);
    marker.scale.set(s, s, s);
    if(markerLife<=0) marker.visible=false;
  }

  renderer.render(scene,camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
